services:
  web:
    build: .
    ports:
      - "3000:3000"  # Map port 3000 inside the container to port 3000 on the host machine
    volumes:
      - .:/app  # Mount the local directory to the /app directory inside the container (useful for live reload during development)
    environment:
      - NODE_ENV=production  # Set the environment to production for optimized performance
    command: ["npm", "run", "start"]  # Start the app in production mode
